<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium To-Do List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: radial-gradient(
          circle at top left,
          #1e1b4b 0%,
          #0f172a 100%
        );
      }
      /* Smooth custom scrollbar for the list */
      #todo-list::-webkit-scrollbar {
        width: 4px;
      }
      #todo-list::-webkit-scrollbar-track {
        background: transparent;
      }
      #todo-list::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-6 antialiased">
    <div
      class="w-full max-w-md bg-slate-900/40 backdrop-blur-2xl border border-white/10 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] p-8 text-white relative overflow-hidden"
    >
      <div
        class="absolute -top-24 -left-24 w-48 h-48 bg-purple-500/20 blur-[80px]"
      ></div>

      <header class="mb-10 relative">
        <h1 class="text-4xl font-bold tracking-tight text-white mb-2">
          Inbox<span class="text-purple-500">.</span>
        </h1>
        <p
          class="text-slate-400 text-sm font-medium tracking-wide uppercase opacity-70"
        >
          Focus on what matters
        </p>
      </header>

      <form id="todo-form" class="relative group mb-8">
        <div
          class="absolute -inset-0.5 bg-gradient-to-r from-purple-500 to-blue-500 rounded-2xl opacity-20 group-focus-within:opacity-100 transition duration-500 blur-sm"
        ></div>
        <div class="relative flex items-center">
          <input
            type="text"
            id="todo-input"
            placeholder="Add a new task..."
            class="w-full bg-slate-950/80 border border-white/5 rounded-2xl py-4 px-5 pr-14 focus:outline-none focus:ring-0 transition-all placeholder:text-slate-600 text-slate-100 font-medium"
          />
          <button
            type="submit"
            class="absolute right-2.5 bg-white text-black hover:bg-purple-500 hover:text-white p-2 rounded-xl transition-all duration-300 shadow-lg active:scale-95"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2.5"
                d="M12 4v16m8-8H4"
              />
            </svg>
          </button>
        </div>
      </form>

      <ul
        id="todo-list"
        class="space-y-3 max-height-[400px] overflow-y-auto pr-1"
      >
        <li
          class="flex items-center justify-between bg-white/[0.03] border border-white/5 p-4 rounded-2xl group hover:bg-white/[0.07] hover:border-white/10 transition-all duration-300"
        >
          <div class="flex items-center space-x-4">
            <button
              class="w-6 h-6 rounded-lg border-2 border-slate-700 flex items-center justify-center group-hover:border-purple-500 transition-colors"
            >
              <div
                class="w-2.5 h-2.5 bg-purple-500 rounded-sm opacity-0 group-hover:opacity-20 transition-opacity"
              ></div>
            </button>
            <span
              class="text-slate-300 font-medium group-hover:text-white transition-colors"
              >Complete the API architecture</span
            >
          </div>
          <button
            class="text-slate-600 hover:text-red-400 transition-all duration-200 opacity-0 group-hover:opacity-100 transform translate-x-2 group-hover:translate-x-0"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-5 w-5"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
              />
            </svg>
          </button>
        </li>
      </ul>

      <div
        class="mt-10 pt-6 border-t border-white/5 flex justify-between items-center"
      >
        <div class="flex flex-col">
          <span
            id="item-count"
            class="text-xs font-bold text-slate-500 uppercase tracking-widest"
            >0 Items Total</span
          >
        </div>
        <button
          id="clear-completed"
          class="text-xs font-bold text-slate-400 hover:text-purple-400 uppercase tracking-widest transition-colors py-2 px-4 rounded-lg hover:bg-purple-500/10"
        >
          Clear Completed
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
